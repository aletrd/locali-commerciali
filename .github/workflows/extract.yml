name: Extract ZIP
on: push
jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Unzip
        run: unzip -o locali-github-upload.zip
      - name: Remove ZIP
        run: rm locali-github-upload.zip
      - name: Push files
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git commit -m "estrai files" || echo "nothing to commit"
          git push
