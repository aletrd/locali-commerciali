name: Extract ZIP
on: push
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: unzip locali-github-upload.zip -d . && rm locali-github-upload.zip
      - run: git config user.email "action@github.com" && git config user.name "Action"
      - run: git add . && git commit -m "estrai files" && git push
